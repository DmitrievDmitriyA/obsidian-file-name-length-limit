name: Feature request
description: Suggest an improvement (new platform rules, sync-service support, UI options).
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation first — the best solution might differ from the one you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
