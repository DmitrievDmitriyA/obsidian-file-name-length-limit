name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  # Required by actions/attest-build-provenance to sign attestations.
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Verify the tag matches manifest.json
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(grep -oP '"version"\s*:\s*"\K[^"]+' manifest.json)
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag ($tag) does not match manifest.json version ($manifest_version)." >&2
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --generate-notes \
            main.js manifest.json styles.css
